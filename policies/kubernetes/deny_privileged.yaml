apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-privileged-containers
  annotations:
    policies.kyverno.io/title: Deny Privileged Containers
    policies.kyverno.io/severity: critical
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Privileged containers have all root capabilities of the host and can
      access the host's devices, kernel, and namespaces. This completely
      negates the security benefits of containerization and has been exploited
      in attacks like the Tesla Kubernetes cluster breach (2018).
spec:
  validationFailureAction: enforce
  background: true
  rules:
    - name: check-privileged
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: >-
          Privileged containers are prohibited. A privileged container has
          all host capabilities, bypassing container security boundaries.
          This was a key vector in the 2018 Tesla Kubernetes breach.
        pattern:
          spec:
            containers:
              - securityContext:
                  privileged: false
