name: kyverno-policy-suite
policies:
  - ../policies/kubernetes/require_resource_limits.yaml
  - ../policies/kubernetes/deny_root.yaml
  - ../policies/kubernetes/deny_privileged.yaml
resources:
  - ../test-fixtures/bad/kubernetes/deployment-bad.yaml
  - ../test-fixtures/clean/kubernetes/deployment-clean.yaml
results:
  # Bad deployment - should fail all three policies
  - policy: require-resource-limits
    rule: check-resource-limits
    resource: bad-deployment
    kind: Deployment
    result: fail
  - policy: deny-root-containers
    rule: check-run-as-non-root
    resource: bad-deployment
    kind: Deployment
    result: fail
  - policy: deny-privileged-containers
    rule: check-privileged
    resource: bad-deployment
    kind: Deployment
    result: fail
  - policy: require-resource-limits
    rule: check-resource-limits
    resource: bad-pod
    kind: Pod
    result: fail
  - policy: deny-root-containers
    rule: check-run-as-non-root
    resource: bad-pod
    kind: Pod
    result: fail
  - policy: deny-privileged-containers
    rule: check-privileged
    resource: bad-pod
    kind: Pod
    result: fail

  # Clean deployment - should pass all three policies
  - policy: require-resource-limits
    rule: check-resource-limits
    resource: clean-deployment
    kind: Deployment
    result: pass
  - policy: deny-root-containers
    rule: check-run-as-non-root
    resource: clean-deployment
    kind: Deployment
    result: pass
  - policy: deny-privileged-containers
    rule: check-privileged
    resource: clean-deployment
    kind: Deployment
    result: pass
  - policy: require-resource-limits
    rule: check-resource-limits
    resource: clean-pod
    kind: Pod
    result: pass
  - policy: deny-root-containers
    rule: check-run-as-non-root
    resource: clean-pod
    kind: Pod
    result: pass
  - policy: deny-privileged-containers
    rule: check-privileged
    resource: clean-pod
    kind: Pod
    result: pass
